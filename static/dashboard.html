<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureVault • Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body onload="requireAuth()" style="margin:0;min-height:100vh;overflow-y:auto;">

  <!-- SIDEBAR (UNCHANGED except rename) -->
  <div class="nav">
    <h2>🔐 SecureVault</h2>

    <a href="/static/dashboard.html" class="active">Dashboard</a>
    <a href="/static/notes.html">Notes</a>
    <a href="/static/todos.html">To-Do’s</a>
    <a href="/static/passwords.html">Passwords</a>

    <!-- renamed -->
    <a href="/static/pqc.html">Metrics</a>

    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main" style="
    position:relative;
    min-height:100vh;
    overflow-y:auto;
    padding:0;
  ">

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline preload="auto" style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
    ">
      <source src="/static/img/bgvideo-1.0.mp4" type="video/mp4">
    </video>

    <!-- OVERLAY -->
    <div style="
      position:absolute;
      inset:0;
      background:linear-gradient(
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.35)
      );
      z-index:1;
    "></div>

    <!-- CONTENT -->
    <div style="
      position:relative;
      z-index:2;
      min-height:100vh;
      padding:16px 28px 40px;
      box-sizing:border-box;
      display:flex;
      flex-direction:column;
    ">

      <!-- HEADER -->
      <div>
        <h1 style="margin:0 0 4px;font-size:24px;">Welcome 👋</h1>
        <p style="margin:0 0 18px;font-size:13px;">
          Your quantum-safe vault is active.
        </p>
      </div>

      <!-- GRID -->
      <div style="
        display:flex;
        justify-content:center;
        align-items:flex-start;
        padding-bottom:32px;
      ">

        <div class="grid" style="
          display:grid;
          grid-template-columns:repeat(2, minmax(260px, 1fr));
          gap:16px;
          max-width:900px;
          width:100%;
        ">

          <!-- NOTES -->
          <div class="card hover" onclick="goNotes()" style="text-align:center;">
            <video autoplay muted loop playsinline
              style="width:200px;margin:6px auto 8px;display:block;">
              <source src="/static/img/notesvideo-logo.mp4" type="video/mp4">
            </video>
            <h3 style="margin:4px 0;">📝 Notes</h3>
            <p style="margin:0;font-size:13px;">Encrypted private notes</p>
          </div>

          <!-- TODOS -->
          <div class="card hover" onclick="goTodos()" style="text-align:center;">
            <video autoplay muted loop playsinline
              style="width:200px;margin:6px auto 8px;display:block;">
              <source src="/static/img/todovideo-logo.mp4" type="video/mp4">
            </video>
            <h3 style="margin:4px 0;">✅ To-Dos</h3>
            <p style="margin:0;font-size:13px;">Encrypted task management</p>
          </div>

          <!-- PASSWORDS -->
          <div class="card hover" onclick="goPasswords()" style="text-align:center;">
            <video autoplay muted loop playsinline
              style="width:200px;margin:6px auto 8px;display:block;">
              <source src="/static/img/passwordvideo-logo.mp4" type="video/mp4">
            </video>
            <h3 style="margin:4px 0;">🔑 Password Vault</h3>
            <p style="margin:0;font-size:13px;">Store credentials securely</p>
          </div>

          <!-- PQC METRICS (changed link) -->
          <div class="card hover" onclick="openMetrics()" style="text-align:center;">
            <video autoplay muted loop playsinline
              style="width:200px;margin:6px auto 8px;display:block;">
              <source src="/static/img/metricsvideo-logo.mp4" type="video/mp4">
            </video>
            <h3 style="margin:4px 0;">🧠 PQC Metrics</h3>
            <p style="margin:0;font-size:13px;">CRYSTALS-Kyber proof</p>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>

  <!-- NEW FUNCTION ONLY -->
  <script>

  function openMetrics() {

    window.location.href =
      "https://pqc-dashboard.onrender.com/";

  }

  </script>

</body>
</html>
