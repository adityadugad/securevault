<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureVault • Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Modern theme -->
  <link rel="stylesheet" href="/static/css/style.css" />

  <style>
    html, body {
      height: 100%;
      overflow-y: auto;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    body > *:not(.bg-video) {
      position: relative;
      z-index: 1;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
    }

    .forgot-link {
      display: block;
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video id="bgVideo" class="bg-video" autoplay muted loop playsinline>
    <source src="/static/img/signvideo-bg.mp4?v=1" type="video/mp4">
  </video>

  <!-- CONTENT -->
  <div class="container">
    <div class="card">

      <div class="brand">
        <span class="badge">PQC Secured</span>
      </div>

      <h1>SecureVault</h1>
      <p>Login with quantum-safe protection</p>

      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />

      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <!-- LOGIN BUTTON -->
      <button class="btn" onclick="loginWithWake()">Login</button>

      <a href="/static/forgot-password.html" class="forgot-link muted">
        Forgot password?
      </a>

      <div class="row" style="margin-top:12px">
        <button class="btn secondary" onclick="goSignup()">
          Create account
        </button>
      </div>

      <div id="msg" class="msg"></div>

    </div>
  </div>

  <!-- AUTH JS (unchanged) -->
  <script src="/static/js/auth.js"></script>

  <!-- Slow video -->
  <script>
    window.addEventListener("load", function () {
      const video = document.getElementById("bgVideo");
      if (video) {
        video.playbackRate = 0.7;
      }
    });
  </script>


  <!-- ✅ WAKE REQUEST + LOGIN WRAPPER -->
  <script>

  async function loginWithWake() {

    try {

      // wake render backend
      fetch("https://pqc-dashboard.onrender.com/", {
        method: "GET",
        mode: "no-cors"
      }).catch(() => {});

      // small delay for cold start
      await new Promise(r => setTimeout(r, 800));

      // call original login function
      login();

    } catch (e) {

      login();

    }

  }

  </script>

</body>
</html>
