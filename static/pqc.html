<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureVault • PQC Metrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/style.css" />

  <style>
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 650px;
      margin-top: 25px;
    }

    .metrics-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .metrics-table td {
      padding: 8px 10px;
    }

    .metrics-table td:first-child {
      color: #9ca3af;
    }

    .metrics-table td:last-child {
      text-align: right;
      font-weight: 600;
    }

    /* ADMIN PANEL */
    #adminBox {
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 90%;
      background: #111;
      color: #0f0;
      overflow: auto;
      padding: 20px;
      z-index: 9999;
      border: 2px solid #0f0;
      display: none;
    }
  </style>
</head>

<body onload="requireAuth(); loadPqcMetrics();">

  <!-- Background -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="/static/img/metricsvideo-bg.mp4?v=2" type="video/mp4">
  </video>

  <div class="video-overlay"></div>

  <!-- SIDEBAR -->
  <div class="nav">
    <h3>🔐 SecureVault</h3>
    <a href="/static/dashboard.html">Dashboard</a>
    <a href="/static/notes.html">Notes</a>
    <a href="/static/todos.html">To-Dos</a>
    <a href="/static/passwords.html">Passwords</a>
    <a class="active" href="/static/pqc.html">PQC Metrics</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>🧠 PQC Metrics (Live)</h1>

    <div class="card">
      <h3>CRYSTALS-Kyber Hybrid Metrics</h3>
      <table class="metrics-table" id="metricsTable"></table>
      <div id="pqcMsg" class="msg muted"></div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminBox"></div>

  <script src="/static/js/auth.js"></script>

  <!-- METRICS -->
  <script>

    function formatLabel(text) {
      return text.replaceAll("_"," ")
                 .toLowerCase()
                 .replace(/\b\w/g,c=>c.toUpperCase());
    }

    async function loadPqcMetrics() {

      const res = await fetch("/pqc/metrics");
      const data = await res.json();

      const table = document.getElementById("metricsTable");
      table.innerHTML = "";

      for (const k in data) {

        let r = document.createElement("tr");

        r.innerHTML =
          "<td>"+formatLabel(k)+"</td>"+
          "<td>"+data[k]+"</td>";

        table.appendChild(r);
      }
    }

    setInterval(loadPqcMetrics, 600000);

  </script>


  <!-- ADMIN SHORTCUT -->

  <script>

  window.addEventListener("keydown", function(e) {

    // CTRL + SHIFT + D
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "d") {

      openAdminPanel();

    }

  });


  async function openAdminPanel() {

    let id = prompt("Admin ID:");
    if (!id) return;

    let pass = prompt("Admin Password:");
    if (!pass) return;

    let r1 = await fetch("/vault/admin/request-otp", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({id,pass})
    });

    if(!r1.ok){
      alert("Invalid admin");
      return;
    }

    let otp = prompt("Enter OTP");
    if(!otp) return;

    let r2 = await fetch("/vault/admin/encrypted-db",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({otp:otp.trim()})
    });

    if(!r2.ok){
      alert("Invalid OTP");
      return;
    }

    let data = await r2.json();

    showAdmin(data);

  }



  function showAdmin(data){

    let box = document.getElementById("adminBox");

    let html = "<h2>Encrypted Database</h2>";

    html += "<h3>Notes</h3>";

    data.notes.forEach(n=>{

      html += "<pre>"
        +"ID: "+n[0]+"\n"
        +"User: "+n[1]+"\n"
        +"Title: "+n[2]+"\n"
        +"Ciphertext: "+n[3]+"\n"
        +"Nonce: "+n[4]+"\n"
        +"Created: "+n[5]+"\n"
        +"KEM: "+n[6]+"\n"
        +"Type: "+n[7]
        +"</pre>";

    });


    html += "<h3>Todos</h3>";

    data.todos.forEach(t=>{
      html += "<pre>"+JSON.stringify(t,null,2)+"</pre>";
    });


    html += "<h3>Passwords</h3>";

    data.passwords.forEach(p=>{
      html += "<pre>"+JSON.stringify(p,null,2)+"</pre>";
    });


    html += "<br><button onclick='closeAdmin()'>Close</button>";

    box.innerHTML = html;
    box.style.display = "block";

  }


  function closeAdmin(){
    document.getElementById("adminBox").style.display="none";
  }

  </script>

</body>
</html>
