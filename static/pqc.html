<body onload="requireAuth(); loadPqcMetrics();">

  </video>

  <!-- SIDEBAR -->
  <div class="nav">

  <!-- MAIN -->
  <div class="main">

    <h1>🧠 PQC Metrics (Live)</h1>

    <p class="muted">
      Runtime-generated metrics proving PQC-backed hybrid encryption
    </p>

    <div class="card">

      <h3>CRYSTALS-Kyber Hybrid Metrics</h3>

      <table class="metrics-table" id="metricsTable"></table>

      <div id="pqcMsg" class="msg muted" style="display:none;"></div>

    </div>

  </div>


  <!-- AUTH -->
  <script src="/static/js/auth.js"></script>


  <!-- METRICS SCRIPT -->
  <script>

    function formatLabel(text) {
      return text
        .replaceAll("_", " ")
        .toLowerCase()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    async function loadPqcMetrics() {

      try {

        const res = await fetch("/pqc/metrics");

        if (!res.ok) {
          document.getElementById("pqcMsg").innerText =
            "Failed to load PQC metrics";
          return;
        }

        const data = await res.json();
        const table = document.getElementById("metricsTable");

        table.innerHTML = "";

        for (const key in data) {

          const row = document.createElement("tr");

          row.innerHTML =
            "<td>" + formatLabel(key) + "</td>" +
            "<td>" + data[key] + "</td>";

          table.appendChild(row);
        }

      } catch (err) {

        document.getElementById("pqcMsg").innerText =
          "Network error while loading PQC metrics";

      }

    }

    loadPqcMetrics();
    setInterval(loadPqcMetrics, 15 * 60 * 1000);

  </script>



  <!-- ================= ADMIN SHORTCUT ================= -->

  <script>

  window.addEventListener("keydown", function(e) {

    // CTRL + SHIFT + D

    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "d") {

      openAdminPanel();

    }

  });



  async function openAdminPanel() {

    try {

      let id = prompt("Admin ID:");
      if (!id) return;

      let pass = prompt("Admin Password:");
      if (!pass) return;


      let r1 = await fetch("/vault/admin/request-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id, pass})
      });

      if (!r1.ok) {
        alert("Invalid admin credentials");
        return;
      }


      let otp = prompt("Enter OTP sent to admin email");
      if (!otp) return;


      let r2 = await fetch("/vault/admin/encrypted-db", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ otp: otp.trim() })
      });

      if (!r2.ok) {
        alert("Invalid OTP");
        return;
      }


      let data = await r2.json();

      showAdminData(data);

    }

    catch (err) {

      alert("Admin error");

    }

  }



  function showAdminData(data) {

    let box = document.createElement("div");

    box.style.position = "fixed";
    box.style.top = "5%";
    box.style.left = "5%";
    box.style.width = "90%";
    box.style.height = "90%";
    box.style.background = "#111";
    box.style.color = "#0f0";
    box.style.overflow = "auto";
    box.style.padding = "20px";
    box.style.zIndex = "9999";
    box.style.border = "2px solid #0f0";


    let html = "<h2>Encrypted Database Data</h2>";


    html += "<h3>Notes</h3>";

    data.notes.forEach(n => {

      html +=
        "<pre>" +
        "ID: " + n[0] + "\n" +
        "User: " + n[1] + "\n" +
        "Title: " + n[2] + "\n" +
        "Ciphertext: " + n[3] + "\n" +
        "Nonce: " + n[4] + "\n" +
        "Created: " + n[5] + "\n" +
        "KEM: " + n[6] + "\n" +
        "Type: " + n[7] +
        "</pre>";

    });


    html += "<h3>Todos</h3>";

    data.todos.forEach(t => {

      html += "<pre>" + JSON.stringify(t, null, 2) + "</pre>";

    });


    html += "<h3>Passwords</h3>";

    data.passwords.forEach(p => {

      html += "<pre>" + JSON.stringify(p, null, 2) + "</pre>";

    });


    html += "<br><button onclick='this.parentElement.remove()'>Close</button>";


    box.innerHTML = html;

    document.body.appendChild(box);

  }

  </script>


</body>
</html>
