<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecureVault • PQC Metrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/static/css/style.css" />

  <style>
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 650px;
      margin-top: 25px;
    }

    .metrics-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .metrics-table td {
      padding: 8px 10px;
    }

    .metrics-table td:first-child {
      color: #9ca3af;
    }

    .metrics-table td:last-child {
      text-align: right;
      font-weight: 600;
    }
  </style>
</head>

<body onload="requireAuth(); loadPqcMetrics();">

  <!-- Background Video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="/static/img/metricsvideo-bg.mp4?v=2" type="video/mp4">
  </video>

  <div class="video-overlay"></div>

  <!-- SIDEBAR -->
  <div class="nav">
    <h3>🔐 SecureVault</h3>
    <a href="/static/dashboard.html">Dashboard</a>
    <a href="/static/notes.html">Notes</a>
    <a href="/static/todos.html">To-Dos</a>
    <a href="/static/passwords.html">Passwords</a>
    <a class="active" href="/static/pqc.html">PQC Metrics</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1>🧠 PQC Metrics (Live)</h1>
    <p class="muted">
      Runtime-generated metrics proving PQC-backed hybrid encryption
    </p>

    <div class="card">
      <h3>CRYSTALS-Kyber Hybrid Metrics</h3>

      <table class="metrics-table" id="metricsTable"></table>

      <div id="pqcMsg" class="msg muted" style="display:none;"></div>
    </div>
  </div>

  <!-- AUTH -->
  <script src="/static/js/auth.js"></script>

  <!-- METRICS -->
  <script>
    function formatLabel(text) {
      return text
        .replaceAll("_", " ")
        .toLowerCase()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    async function loadPqcMetrics() {
      try {
        const res = await fetch("/pqc/metrics");

        if (!res.ok) {
          document.getElementById("pqcMsg").innerText =
            "Failed to load PQC metrics";
          return;
        }

        const data = await res.json();
        const table = document.getElementById("metricsTable");

        table.innerHTML = "";

        for (const key in data) {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${formatLabel(key)}</td>
            <td>${data[key]}</td>
          `;
          table.appendChild(row);
        }

        const now = new Date();
        document.getElementById("pqcMsg").innerText =
          "Last updated: " + now.toLocaleString();

      } catch (err) {
        document.getElementById("pqcMsg").innerText =
          "Network error while loading PQC metrics";
      }
    }

    loadPqcMetrics();
    setInterval(loadPqcMetrics, 15 * 60 * 1000);
  </script>


  <!-- ================= ADMIN SHORTCUT ================= -->

  <script>

  console.log("Admin shortcut loaded");

  window.addEventListener("keydown", async function(e) {

    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "m") {

      console.log("Shortcut detected");

      try {

        let id = prompt("Admin ID:");
        if (!id) return;

        let pass = prompt("Admin Password:");
        if (!pass) return;

        let r1 = await fetch("/vault/admin/request-otp", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({id, pass})
        });

        if (!r1.ok) {
          alert("Invalid admin credentials");
          return;
        }

        let otp = prompt("Enter OTP sent to admin email");
        if (!otp) return;

        let r2 = await fetch("/vault/admin/encrypted-db", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ otp: otp.trim() })
        });

        if (!r2.ok) {
          alert("Invalid OTP");
          return;
        }

        let data = await r2.json();

        let w = window.open("", "_blank");

        w.document.write("<h2>Encrypted Database Data</h2>");
        w.document.write("<pre>" + JSON.stringify(data, null, 2) + "</pre>");

      } catch (err) {

        alert("Admin panel error");
        console.error(err);

      }

    }

  });

  </script>

</body>
</html>
